# Netlify build & runtime configuration for Next.js 14 App Router.
#
# The official @netlify/plugin-nextjs is auto-detected when this file is
# present alongside a Next.js project — no need to add it manually to deps.
# It handles:
#   - server components & server actions
#   - dynamic route handlers (e.g. /share-target POST)
#   - on-demand revalidation (revalidatePath)
#   - the @ducanh2912/next-pwa generated service worker

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 14 telemetry — opt out for faster, leaner builds.
  NEXT_TELEMETRY_DISABLED = "1"
  # Node version aligned with local dev (22.x).
  NODE_VERSION = "22"

# Long-cache the static assets emitted by Next under /_next/static.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must not be cached aggressively so PWA updates roll out.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Brand assets — long-cache.
[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
